<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>
<link rel="icon" type="image/png" href="../logo.png">
<link rel="stylesheet" href="../style.css">
</head>

<body class="scientific-page">

<div class="page-header scientific-header">
<h1>🔬 Scientific Calculator</h1>
</div>

<div class="angle-toggle">

<span id="degLabel" class="active">DEG</span>

<label class="switch">
<input type="checkbox" id="angleToggle">
<span class="slider"></span>
</label>

<span id="radLabel">RAD</span>

</div>
<div class="scientific-calculator">

<div class="display-box">
<div id="expression"></div>
<div id="result">0</div>
</div>

<div class="calc-grid">

<!-- scientific buttons -->

<button onclick="appendValue('sin(')">sin</button>
<button onclick="appendValue('cos(')">cos</button>
<button onclick="appendValue('tan(')">tan</button>

<button onclick="appendValue('log(')">log</button>
<button onclick="appendValue('ln(')">ln</button>
<button onclick="appendValue('sqrt(')">√</button>

<button onclick="appendValue('pi')">π</button>
<button onclick="appendValue('^2')">x²</button>
<button onclick="appendValue('^')">xʸ</button>

<button onclick="appendValue('(')">(</button>
<button onclick="appendValue(')')">)</button>
<button onclick="appendValue('%')">%</button>

<!-- number buttons -->

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('/')">÷</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('*')">×</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('-')">−</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="appendValue('+')">+</button>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

</div>

<br>

<a href="../index.html">⬅ Back to Home</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="../js/scientific.js"></script>

</body>
</html>
