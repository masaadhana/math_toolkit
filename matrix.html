<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Matrix Calculator</title>
<link rel="icon" type="image/png" href="../logo.png">
<link rel="stylesheet" href="../style.css">
</head>

<body class="matrix-page">

<div class="page-header matrix-header">
<h1>🔢 Matrix Calculator</h1>
</div>

<div class="matrix-container">

<div class="matrix-grid">

<div class="matrix-card" onclick="showOperation('add')">
Matrix Addition
</div>

<div class="matrix-card" onclick="showOperation('subtract')">
Matrix Subtraction
</div>

<div class="matrix-card" onclick="showOperation('multiply')">
Matrix Multiplication
</div>

<div class="matrix-card" onclick="showOperation('determinant')">
Determinant
</div>

<div class="matrix-card" onclick="showOperation('transpose')">
Transpose
</div>

<div class="matrix-card" onclick="showOperation('minor')">
Minor Matrix
</div>

<div class="matrix-card" onclick="showOperation('cofactor')">
Cofactor Matrix
</div>

<div class="matrix-card" onclick="showOperation('adjoint')">
Adjoint Matrix
</div>

<div class="matrix-card" onclick="showOperation('inverse')">
Inverse Matrix
</div>
</div>

<div id="matrixWorkspace"></div>

</div>

<br>

<a href="../index.html">⬅ Back to Home</a>

<script src="../js/matrix.js"></script>

</body>
</html>
